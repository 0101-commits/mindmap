<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 E2E 성과관리 · HR 아키텍처 마인드맵</title>
  <!-- vis-network (CDN) -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== 상단 헤더 / 필터 ===== -->
  <header id="topbar">
    <div class="brand">
      <h1>E2E 성과관리 · HR 아키텍처 <span>마인드맵</span></h1>
      <p class="subtitle">목표수립 · 체크인 · 평가 · 피드백 &nbsp;|&nbsp; CSF→KPI &nbsp;|&nbsp; HR AI 4-Layer</p>
    </div>

    <div class="filters">
      <div class="filter-label">그룹 필터 (클릭 = 표시/숨김)</div>
      <div id="filterChips" class="chips"><!-- JS가 그룹 칩 생성 --></div>
      <div class="filter-actions">
        <input type="text" id="searchBox" placeholder="🔍 노드 검색 후 Enter" />
        <button id="btnAll" class="btn">전체</button>
        <button id="btnNone" class="btn ghost">모두 끄기</button>
      </div>
    </div>
  </header>

  <!-- ===== 본문: 마인드맵 + 사이드패널 ===== -->
  <main id="stage">
    <!-- 플로팅 툴바 (요구사항 1·2) -->
    <div class="floating-toolbar">
      <button id="btnAdd"     class="tool primary">＋ 노드 추가</button>
      <button id="btnTidy"    class="tool">⟳ 화면 정리</button>
      <button id="btnHier"    class="tool">⌗ 계층형</button>
      <button id="btnFit"     class="tool">⤢ 전체 보기</button>
      <button id="btnExport"  class="tool">⭳ data.js 내보내기</button>
      <button id="btnRestore" class="tool ghost2">↺ 기본값 복원</button>
    </div>

    <div id="network"></div>

    <aside id="sidepanel" class="closed">
      <button id="panelClose" aria-label="닫기">×</button>
      <div class="panel-tag" id="panelTag">그룹</div>
      <h2 id="panelTitle">노드를 클릭하세요</h2>

      <div class="panel-actions" id="panelActions" style="display:none">
        <button id="btnEdit" class="btn small">✎ 수정</button>
        <button id="btnDel"  class="btn small danger">🗑 삭제</button>
      </div>

      <p id="panelSummary" class="panel-summary">
        노드를 클릭하면 상세 설명과 연결관계가 표시됩니다. 클릭 시 이웃 노드가 강조되고 나머지는 흐려집니다.
      </p>
      <ul id="panelDetail" class="panel-detail"></ul>
      <div class="panel-related" id="panelRelatedWrap" style="display:none">
        <div class="related-label">연결된 노드</div>
        <div id="panelRelated" class="related-list"></div>
      </div>
    </aside>
  </main>

  <footer id="legendbar">
    <span class="hint">💡 노드/선 클릭 → 이웃 강조 + 상세 &nbsp;·&nbsp; 빈 곳 클릭 → 해제 &nbsp;·&nbsp; 휠 확대 / 드래그 이동 &nbsp;·&nbsp; 점선 = 보조 연결</span>
  </footer>

  <!-- ===== CRUD 모달 (요구사항 1) ===== -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <button id="modalClose" aria-label="닫기">×</button>
      <h3 id="modalTitle">노드 추가</h3>

      <label for="fLabel">이름 (라벨) <em>*</em></label>
      <input id="fLabel" type="text" placeholder="예) 신규 평가지표" />

      <label for="fGroup">그룹 <em>*</em></label>
      <select id="fGroup"></select>

      <label for="fSummary">한 줄 요약</label>
      <input id="fSummary" type="text" placeholder="패널 상단에 표시될 짧은 설명" />

      <label for="fDetail">상세 (한 줄 = 한 항목)</label>
      <textarea id="fDetail" rows="5" placeholder="줄바꿈으로 여러 항목 입력"></textarea>

      <div id="connectRow">
        <label for="fConnect">연결할 노드 (선택)</label>
        <select id="fConnect"></select>
        <small class="hint-sm">선택한 노드와 새 노드를 선으로 연결합니다.</small>
      </div>

      <div class="modal-actions">
        <button id="fDelete" class="btn danger" style="display:none">삭제</button>
        <span class="spacer"></span>
        <button id="fCancel" class="btn ghost-dark">취소</button>
        <button id="fSave" class="btn primary">저장</button>
      </div>
    </div>
  </div>

  <!-- ===== 토스트 ===== -->
  <div id="toast" class="toast hidden"></div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
